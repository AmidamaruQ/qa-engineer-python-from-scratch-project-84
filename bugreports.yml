---
- summary: |
    Отсутствует фильтр товаров по цвету
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Открыть сайт магазина https://products-store-ru.hexlet.app/
    2. Проверить наличие фильтрации товаров по цвету
  expected-result: |
    На странице доступен фильтр товаров по цвету
  actual-result: |
    Фильтр товаров по цвету отсутствует

- summary: |
    Отсутствует фильтр товаров по размеру
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Открыть сайт магазина https://products-store-ru.hexlet.app/
    2. Проверить наличие фильтрации товаров по размеру
  expected-result: |
    На странице доступен фильтр товаров по размеру
  actual-result: |
    Фильтр товаров по размеру отсутствует

- summary: |
    Нельзя очистить фильтр по категории
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Нажать на элемент выбора категории
  expected-result: |
    Доступна возможность сбросить выбранную категорию
  actual-result: |
    Возможность сброса фильтра по категории отсутствует

- summary: |
    Интерфейс не адаптирован под мобильные устройства
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    - Открыть главную страницу магазина
    - Открыть инструменты разработчика
    - Включить режим адаптивного отображения
    - Выбрать устройство iPhone 12 Pro
    - Проверить, изменился ли интерфейс приложения
  expected-result: |
    Сайт корректно адаптируется под мобильное разрешение, верстка не ломается
  actual-result: |
    Сайт не адаптируется под мобильное разрешение, верстка нарушается

- summary: |
    Кнопка «Предыдущая» видна на первой странице каталога
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Открыть страницу магазина https://products-store-ru.hexlet.app/
  expected-result: |
    Кнопка «Предыдущая» не отображается на первой странице
  actual-result: |
    Кнопка «Предыдущая» отображается уже на первой странице каталога

- summary: |
    На странице с одним товаром отображаются лишние кнопки пагинации
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Выбрать производителя Huawei
  expected-result: |
    Кнопки «Предыдущая» и «Следующая» не отображаются
  actual-result: |
    Кнопки «Предыдущая» и «Следующая» отображаются

- summary: |
    Нет возможности увеличить изображение товара
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Открыть любой товар
    2. Перейти в его карточку
    3. Нажать на миниатюру изображения в нижнем ряду
  expected-result: |
    Изображение товара увеличивается
  actual-result: |
    Увеличение изображения не происходит

- summary: |
    Названия категорий не переводятся на русский язык в русской версии сайта
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Переключить сайт на русскую версию
    2. Открыть список категорий
  expected-result: |
    Названия категорий отображаются на русском языке
  actual-result: |
    Названия категорий остаются без перевода

- summary: |
    При оформлении заказа сервер возвращает ошибку 500
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Открыть инструменты разработчика
    2. Добавить товар в корзину
    3. Перейти в корзину
    4. Нажать на кнопку «Оформить заказ»
  expected-result: |
    Ошибка отсутствует, данные заказа успешно отправляются на сервер
  actual-result: |
    Сервер возвращает ошибку, данные заказа не отправляются

- summary: |
    Кнопка закрытия не работает в окне успешного оформления заказа
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Добавить товар в корзину
    2. Открыть корзину
    3. Нажать на кнопку «Оформить заказ»
    4. Нажать на кнопку закрытия
  expected-result: |
    Модальное окно закрывается
  actual-result: |
    Модальное окно не закрывается

- summary: |
    При оформлении заказа возникает ошибка 500
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Добавить любой товар в корзину
    2. Перейти в корзину
    3. Открыть DevTools и вкладку Network
    4. Нажать Checkout
  expected-result: |
    Заказ оформляется успешно
  actual-result: |
    Возвращается ответ failed с кодом 500

- summary: |
    При отключении чекбокса In Stock список товаров не отображается
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Отключить фильтр In Stock
  expected-result: |
    Отображаются все товары каталога, независимо от наличия на складе
  actual-result: |
    Каталог становится пустым

- summary: |
    В меню выбора языка не отображается иконка английского языка
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Нажать Language
  expected-result: |
    У английского языка отображается иконка
  actual-result: |
    Иконка английского языка не загружается

- summary: |
    Фильтрация применяется только к текущей странице каталога
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Применить любой фильтр: по ключевому слову, цене, бренду или категории
  expected-result: |
    Отображаются отфильтрованные товары из всего каталога
  actual-result: |
    Отображаются только товары с текущей страницы каталога

- summary: |
    Функциональность оплаты заказа отсутствует
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Добавить товар в корзину
    2. Перейти в корзину
    3. Нажать Checkout
  expected-result: |
    Пользователь может оплатить заказ
  actual-result: |
    Оплата заказа не реализована

- summary: |
    Мобильная версия сайта не реализована
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Открыть DevTools
    2. Включить панель устройств
    3. Выбрать любое мобильное разрешение
  expected-result: |
    Сайт адаптируется под мобильное разрешение
  actual-result: |
    Мобильная версия сайта отсутствует

- summary: |
    Окно оформления заказа не закрывается по клику на крестик
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Добавить товар в корзину
    2. Перейти в корзину
    3. Нажать Checkout
    4. Закрыть модальное окно по кнопке с крестиком
  expected-result: |
    Модальное окно закрывается
  actual-result: |
    Ничего не происходит

- summary: |
    В корзине цена без скидки отображается только для одной единицы товара при количестве больше одного
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Добавить несколько единиц одного товара в корзину
    2. Перейти в корзину
  expected-result: |
    Для товара отображается общая стоимость без скидки и со скидкой
  actual-result: |
    Цена без скидки показана только для одной единицы товара

- summary: |
    Фильтр по цене использует стоимость без учета скидки
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
  steps-to-reproduce: |
    1. Найти товар со скидкой
    2. Указать верхнюю границу цены между полной ценой и ценой со скидкой
  expected-result: |
    Выбранный товар отображается в результатах фильтрации
  actual-result: |
    Товар отсутствует в результатах фильтрации

- summary: |
    Для фильтра по категории отсутствует сброс
  environment: |
    Google Chrome 126.0.6478.127
    macOS Sonoma 14.5
