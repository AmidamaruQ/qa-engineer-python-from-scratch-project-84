bugreports:
  - summary: |
      Нет уведомления о некорректном вводе при фильтрации по цене
    environment: |
      Google Chrome 126.0.6478.127
      macOS Sonoma 14.5
    steps-to-reproduce: |
      1. Ввести диапазон цены от 0 до 0
    expected-result: |
      Пользователь видит сообщение о некорректном вводе, товары не отображаются
    actual-result: |
      Сообщение о некорректном вводе отсутствует, товары продолжают отображаться

  - summary: |
      Отсутствует кнопка «Следующая» при переходе в режим поиска без категории
    environment: |
      Google Chrome 126.0.6478.127
      macOS Sonoma 14.5
    steps-to-reproduce: |
      1. Выбрать пустое значение в фильтре категории товаров
    expected-result: |
      Отображается кнопка «Следующая» для перехода к другим страницам каталога
    actual-result: |
      Кнопка «Следующая» отсутствует

  - summary: |
      Верстка сайта ломается при выборе некоторых производителей
    environment: |
      Google Chrome 126.0.6478.127
      macOS Sonoma 14.5
    steps-to-reproduce: |
      1. Выбрать производителя OPPO
      2. Проверить отображение карточек товаров
    expected-result: |
      Верстка каталога остается корректной
    actual-result: |
      Верстка каталога нарушается
