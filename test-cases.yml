---
- summary: |
    Фильтрация товаров по стоимости
  requirement: |
    Пользователь должен иметь возможность фильтровать товары по цене
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Данные не требуются
  steps:
    - Указываем диапазон значений в блоке «Цена»
  expected-result: |
    На странице остаются товары, попадающие в указанный ценовой диапазон

- summary: |
    Поиск товаров по ключевому слову
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Данные не требуются
  steps:
    - Вводим в строку поиска ключевое слово Samsung
  expected-result: |
    В каталоге отображаются товары, соответствующие введенному ключевому слову

- summary: |
    Добавление товара в корзину
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину и просматривать содержимое корзины
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Данные не требуются
  steps:
    - Выбираем товар
    - Добавляем его в корзину
    - Переходим по кнопке «Корзина»
  expected-result: |
    В корзине отображается добавленный товар

- summary: |
    Просмотр карточки товара
  requirement: |
    Пользователь должен иметь возможность просматривать подробную информацию о товаре
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Данные не требуются
  steps:
    - Нажимаем на любой товар из списка
  expected-result: |
    Открывается страница с названием, изображениями, ценой и описанием товара

- summary: |
    Проверка отображения сайта в разных браузерах
  requirement: |
    Сайт должен быть протестирован на совместимость с последними версиями браузеров
  prerequisites: |
    Есть доступ к актуальным версиям Google Chrome, Safari и Firefox
  test-data: |
    Данные не требуются
  steps:
    - Открываем браузер Google Chrome
    - Переходим на сайт https://products-store-ru.hexlet.app/
    - Проверяем внешний вид приложения
    - Открываем браузер Safari
    - Переходим на сайт https://products-store-ru.hexlet.app/
    - Проверяем внешний вид приложения
    - Открываем браузер Firefox
    - Переходим на сайт https://products-store-ru.hexlet.app/
    - Проверяем внешний вид приложения
  expected-result: |
    Интерфейс приложения одинаково корректно отображается в последних версиях браузеров

- summary: |
    Проверка адаптивности интерфейса
  requirement: |
    Сайт должен быть доступен на различных устройствах
  prerequisites: |
    Скопирована ссылка на веб-приложение магазина
  test-data: |
    Данные не требуются
  steps:
    - Открываем сайт
      http://adaptivator.ru/?site=https%3A%2F%2Fproducts-store-ru.hexlet.app%2F
    - Вставляем ссылку на приложение в соответствующее поле
    - Проверяем отображение интерфейса на нескольких устройствах
  expected-result: |
    Внешний вид приложения остается корректным на устройствах с разными разрешениями

- summary: |
    Сброс фильтра «Категория»
  requirement: |
    Пользователь должен иметь возможность искать товары по категории
  prerequisites: |
    Открыт каталог товаров
  test-data: |
    Данные не требуются
  steps:
    - Нажимаем на кнопку «Категория»
    - Выбираем любую категорию из списка
    - Повторно открываем список «Категория»
    - Очищаем выбранный фильтр
  expected-result: |
    Фильтр категории сбрасывается, товары отображаются без этого ограничения

